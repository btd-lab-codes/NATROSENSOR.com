{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
	<head>
    	<title> Natrosensor </title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">		
		{% tailwind_css %}
		<script src="{% static '/natrosensor/js/htmx.min.js' %}" > </script>
		<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
	</head>

	<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' class="bg-cover bg-no-repeat h-screen" style="background-image: url({% static '/natrosensor/assets/background.png' %}); background-size: 100% 100%;">		
		{% block content %}
		{% endblock content %}
		<script src="{% static '/natrosensor/js/index.js' %}"> </script>
	</body>
</html>
