{% extends "./sidebar.html" %}
{% load static %}

{% block subcontent %}
<div class="flex flex-col h-screen">  
  <div class="grid grid-cols-3 bg-white dark:bg-dark-primary/95 w-full h-full p-5 gap-2">
      <div class="flex flex-col h-full justify-center items-center">
        <div class="flex bg-cyan-500 rounded-lg justify-center w-1/2 p-1 px-2">
          <span class="text-9xl font-medium">{{user.first_name|first}}{{user.last_name|first}}</span>
        </div> 
      </div>
      <div class="flex flex-col h-full justify-center ps-4">
        <span class="text-2xl font-medium dark:text-white"> Name </span>
        <span class="text-2xl text-blue-600 dark:text-blue-300 mb-5"> {{user.first_name}} {{user.last_name}} </span>
        <span class="text-2xl font-medium dark:text-white"> Institution </span>
        <span class="text-2xl text-blue-600 dark:text-blue-300"> {{user.institution}} </span>
      </div>
  </div>
</div>

{% endblock subcontent %}
