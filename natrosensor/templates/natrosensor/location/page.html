{% extends '../ui/sidebar.html' %}
{% load static %}
{% load filters %}

{% block name %} {{template_name}} {% endblock name %}
{% block section %}
<div class="absolute inset-0">
    <div class="relative w-full h-full">
        {{ map | safe }}
    </div>
    <div x-data="{filter: false, r_id: 0, p_id: 0}" class="absolute items-center right-0 bottom-5 top-3 gap-2 invisible">
        <div class="flex flex-col flex-grow h-full gap-2">
            <div class="flex me-3 gap-2 visible">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
                        <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                        </svg>
                    </div>
                    <input @click="filter = false" type="search" class="block w-full ps-10 px-2.5 py-2.5 text-sm text-gray-900 border-0 border-b-2 border-gray-300 rounded-lg bg-gray-50 focus:ring-0 focus:border-cyan-600" placeholder="Search..."/>
                </div>
                <button @click="filter = !filter" type="button" class="bg-white justify-center items-center border-2 border-gray-400 rounded-lg px-2 py-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5" />
                    </svg>               
                </button>
            </div>
            <form x-cloak method="POST" class="flex flex-col bg-white/70 me-3 rounded-lg transition-all ease-in-out duration-200 visible overflow-x-hidden overflow-y-auto p-3" :class="{'transform scale-y-0 -translate-y-1/2': !filter, 'transform scale-y-100 translate-y-0': filter}">
                {% csrf_token %}
                <span class="font-poppins font-bold text-lg px-2 pb-2"> Filter </span>
                <div x-data="{antibiotics: false, antibiotics_value: '{{antibiotics}}'}" class="flex flex-col w-full p-2">
                    <span class="font-notosans font-semibold text-sm"> Antibiotics </span>
                    <button type="button" @click="antibiotics = !antibiotics" @click.outside="antibiotics = false" class="flex justify-between rounded-md bg-white/90 px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
                        <span class="font-notosans" x-text="antibiotics_value"></span>
                        <svg class="-mr-1 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <input type="hidden" name="location_antibiotics" x-model="antibiotics_value">
                    <div class="absolute flex flex-col flex-grow w-[85%] h-24 bg-white/0 overflow-x-hidden overflow-y-auto mt-14 p-2 z-10 transition-all ease-in-out duration-150 gap-2" :class="{'transform scale-y-0 -translate-y-1/2 bg-white/0': !antibiotics, 'transform scale-y-100 translate-y-0 bg-white ring-1 ring-inset ring-gray-300': antibiotics}">
                        <button type="button" @click="antibiotics_value = 'All'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">All</span>
                        </button>
                        <button type="button" @click="antibiotics_value = 'Azithromycin'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Azithromycin</span>
                        </button>
                        <button type="button" @click="antibiotics_value = 'Ciprofloxacin'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Ciprofloxacin</span>
                        </button>
                        <button type="button" @click="antibiotics_value = 'Metronidazole'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Metronidazole</span>
                        </button>
                        <button type="button" @click="antibiotics_value = 'Penicillin'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Penicillin</span>
                        </button>
                    </div>
                </div>
                <div x-data="{division: false, division_value: '{{division}}'}" class="flex flex-col w-full p-2">
                    <span class="font-notosans font-semibold text-sm"> Division </span>
                    <button type="button" @click="division = !division" @click.outside="division = false" class="flex justify-between rounded-md bg-white/90 px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">
                        <span class="font-notosans" x-text="division_value"></span>
                        <svg class="-mr-1 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <input type="hidden" name="location_division" x-model="division_value">
                    <div class="absolute flex flex-col flex-grow w-[85%] h-24 bg-white/0 overflow-x-hidden overflow-y-auto mt-14 p-2 z-10 transition-all ease-in-out duration-150 gap-2" :class="{'transform scale-y-0 -translate-y-1/2 bg-white/0': !division, 'transform scale-y-100 translate-y-0 bg-white ring-1 ring-inset ring-gray-300': division}">
                        <button type="button" @click="division_value = 'Region'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Region</span>
                        </button>
                        <button type="button" @click="division_value = 'Province'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Province</span>
                        </button>
                        <button type="button" @click="division_value = 'Municipality'" class="flex justify-start hover:bg-blue-400">
                            <span class="font-notosans font-semibold text-sm ps-2">Municipality</span>
                        </button>
                    </div>
                </div>
                <div x-data="{concentration: false, conc_value: ''}" class="flex flex-col p-2">
                    <span class="font-notosans font-semibold text-sm"> Concentration (ppm) </span>
                    <input class="flex justify-between rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm border border-gray-300 hover:bg-gray-50" type="text" />
                </div>
                <div class="flex justify-end px-2 pt-5 pb-3">
                    <button type="submit" class="w-24 items-center text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">Save</button>
                </div>  
            </form>
            <div class="flex flex-col mt-auto ms-20 me-3 rounded-lg bg-white/70 visible p-2">
                <div class="flex pb-1">
                    <span class="font-poppins font-bold text-xs text-black"> Concentration (ppm) </span>
                </div>
                <div class="flex justify-between items-center pb-0.5 px-1">
                    <span class="font-notosans font-semibold text-xs text-black"> Safe </span>
                    <span class="font-notosans font-semibold text-xs text-black"> Danger </span>
                </div>
                <div class="flex justify-center items-center px-1">
                    <div class="bg-rose-200 w-7 h-5"></div>
                    <div class="bg-rose-300 w-7 h-5"></div>
                    <div class="bg-rose-400 w-7 h-5"></div>
                    <div class="bg-rose-500 w-7 h-5"></div>
                    <div class="bg-rose-600 w-7 h-5"></div>
                    <div class="bg-rose-700 w-7 h-5"></div>
                </div>
            </div>
        </div>  
    </div>
</div>
{% endblock section %}
