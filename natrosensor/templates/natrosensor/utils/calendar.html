<script>
    function calendar(events, year, month) {
        return {
            currentDate: new Date(year, month - 1),
            daysWithEvents: events,
            days: [],
            init() {
                this.updateCalendar();
                this.updateMonthYear();
            },
            updateCalendar() {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
    
                const today_year = new Date().getFullYear();
                const today_month = new Date().getMonth();
                const today_day = new Date().getDate();
                
                const firstDay = new Date(year, month, 1).getDay();
                const lastDay = new Date(year, month + 1, 0).getDate();
    
                const options = { year: 'numeric', month: 'long', day: '2-digit' };           
                this.days = [];
                
                for (let i = 0; i < firstDay; i++) {
                    this.days.push({ date: '', month: '', year: '', stringDate: '', current: false, today: false });
                }
                
                for (let day = 1; day <= lastDay; day++) {
                    let today = (today_year == year && today_month == month && today_day == day ) ? true : false;
                    let formatDate = new Date(year, month, day).toLocaleDateString(undefined, options);
                    this.days.push({ date: day, month: month, year: year, stringDate: formatDate, current: true, today: today });
                }
                
                while (this.days.length != 42) {
                    this.days.push({ date: '', month: '', year: '', stringDate: '', current: false, today: false });
                }
            },
            updateMonthYear() {
                const options = { month: 'long', year: 'numeric' };
                this.$refs.monthYear.textContent = this.currentDate.toLocaleDateString(undefined, options);
            },
            hasEvent(day) {
                return this.daysWithEvents[day] === true; 
            }
        }
    }
</script>
