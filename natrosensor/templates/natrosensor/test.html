{% extends "./sidebar.html" %}
{% load static %}

{% block subcontent %}
<div x-data="{step: 1}" class="flex flex-col flex-grow overflow-y-auto overflow-x-hidden bg-white dark:bg-dark-primary h-screen">
    <form hx-post="{% url 'natrosensor:result' %}" hx-swap="outerHTML" hx-encoding='multipart/form-data' class="flex flex-col flex-grow p-3">
        <div class="flex flex-col h-full rounded-lg gap-3 py-4" :class="{'hidden': step != 1}">
            <div class="flex justify-between items-center mb-2 px-4">
                <span class="font-poppins font-bold text-2xl text-slate-800 dark:text-white"> Calibration </span>
                <span class="font-poppins font-bold text-xs text-slate-800 dark:text-slate-500"> Step 1/3 </span>
            </div>
            <div class="px-6">
                <label for="process_name" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Process Name <span class="text-red-500">*</span></label>
                <input type="text" id="process_name" name="process_name" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="Process Name" required/>
            </div>
            <div class="px-6">
                <label for="process_med" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Selected Antibiotics <span class="text-red-500">*</span></label>
                <input type="text" id="process_med" name="process_med" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="Antibiotics" value="Penicillin" required disabled/>
            </div>
            <div class="px-6">
                <label for="process_file" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Calibration Model File <span class="text-red-500">*</span></label>
                <input id="process_file" name="process_file" type="file" aria-describedby="file_input_help" accept=".csv" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600 file:outline-none file:border-0 file:bg-gradient-to-r file:bg-cyan-950 file:rounded-lg file:py-2 file:px-4 file:text-white file:me-3 hover:file:hover:bg-blue-500/80" required/>
            </div>
            <div class="px-6">
                <label for="process_trial" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Trials <span class="text-red-500">*</span></label>
                <input type="number" value="1" min="1" id="process_trial" name="process_trial" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="Number of trials" required/>
            </div>
            <div class="flex justify-end mt-auto px-6 pt-4">
                <button @click="step = 2" type="button" class="w-24 items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-6 py-2.5 text-center">Next</button>
            </div>
        </div>
        <div class="flex flex-col h-full rounded-lg gap-3 py-4" :class="{'hidden': step != 2}">
            <div class="flex justify-between items-center px-4">
                <span class="font-poppins font-bold text-2xl text-slate-800 dark:text-white"> Data Collection </span>
                <span class="font-poppins font-bold text-xs text-slate-800 dark:text-slate-500"> Step 2/3 </span>
            </div>
            <div class="grid md:grid-cols-2 flex-grow gap-3">
                <div x-data="{ connection: true }" class="flex flex-col justify-center items-center p-4">
                    <span class="font-notosans font-bold text-xl dark:text-white"> Sensor Connection </span>
                    <div class="flex flex-col h-full justify-center items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-40 h-40 text-red-500" :class="{'hidden': !connection}">
                            <path fill-rule="evenodd" d="M2.47 2.47a.75.75 0 0 1 1.06 0l8.407 8.407a1.125 1.125 0 0 1 1.186 1.186l1.462 1.461a3.001 3.001 0 0 0-.464-3.645.75.75 0 1 1 1.061-1.061 4.501 4.501 0 0 1 .486 5.79l1.072 1.072a6.001 6.001 0 0 0-.497-7.923.75.75 0 0 1 1.06-1.06 7.501 7.501 0 0 1 .505 10.05l1.064 1.065a9 9 0 0 0-.508-12.176.75.75 0 0 1 1.06-1.06c3.923 3.922 4.093 10.175.512 14.3l1.594 1.594a.75.75 0 1 1-1.06 1.06l-2.106-2.105-2.121-2.122h-.001l-4.705-4.706a.747.747 0 0 1-.127-.126L2.47 3.53a.75.75 0 0 1 0-1.061Zm1.189 4.422a.75.75 0 0 1 .326 1.01 9.004 9.004 0 0 0 1.651 10.462.75.75 0 1 1-1.06 1.06C1.27 16.12.63 11.165 2.648 7.219a.75.75 0 0 1 1.01-.326ZM5.84 9.134a.75.75 0 0 1 .472.95 6 6 0 0 0 1.444 6.159.75.75 0 0 1-1.06 1.06A7.5 7.5 0 0 1 4.89 9.606a.75.75 0 0 1 .95-.472Zm2.341 2.653a.75.75 0 0 1 .848.638c.088.62.37 1.218.849 1.696a.75.75 0 0 1-1.061 1.061 4.483 4.483 0 0 1-1.273-2.546.75.75 0 0 1 .637-.848Z" clip-rule="evenodd" />
                        </svg>  
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-40 h-40 text-green-500" :class="{'hidden': connection}">
                            <path fill-rule="evenodd" d="M5.636 4.575a.75.75 0 0 1 0 1.061 9 9 0 0 0 0 12.728.75.75 0 1 1-1.06 1.06c-4.101-4.1-4.101-10.748 0-14.849a.75.75 0 0 1 1.06 0Zm12.728 0a.75.75 0 0 1 1.06 0c4.101 4.1 4.101 10.75 0 14.85a.75.75 0 1 1-1.06-1.061 9 9 0 0 0 0-12.728.75.75 0 0 1 0-1.06ZM7.757 6.697a.75.75 0 0 1 0 1.06 6 6 0 0 0 0 8.486.75.75 0 0 1-1.06 1.06 7.5 7.5 0 0 1 0-10.606.75.75 0 0 1 1.06 0Zm8.486 0a.75.75 0 0 1 1.06 0 7.5 7.5 0 0 1 0 10.606.75.75 0 0 1-1.06-1.06 6 6 0 0 0 0-8.486.75.75 0 0 1 0-1.06ZM9.879 8.818a.75.75 0 0 1 0 1.06 3 3 0 0 0 0 4.243.75.75 0 1 1-1.061 1.061 4.5 4.5 0 0 1 0-6.364.75.75 0 0 1 1.06 0Zm4.242 0a.75.75 0 0 1 1.061 0 4.5 4.5 0 0 1 0 6.364.75.75 0 0 1-1.06-1.06 3 3 0 0 0 0-4.243.75.75 0 0 1 0-1.061ZM10.875 12a1.125 1.125 0 1 1 2.25 0 1.125 1.125 0 0 1-2.25 0Z" clip-rule="evenodd" />
                        </svg> 
                        <span class="font-notosans font-semibold text-2xl text-green-500" :class="{'hidden': connection}"> Connected </span>
                        <span class="font-notosans font-semibold text-2xl text-red-500" :class="{'hidden': !connection}"> Not Connected </span> 
                        <button @click="connection = !connection" type="button" class="w-24 items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center mt-6 me-2" :class="{'hidden': !connection}">Connect</button>
                        <button @click="connection = !connection" type="button" class="w-28 items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center mt-6 me-2" :class="{'hidden': connection}">Disconnect</button>
                    </div>               
                </div>
                <div class="flex flex-col items-center gap-4 p-4">
                    <span class="font-notosans font-bold text-xl text-center dark:text-white"> Additional Parameters </span>
                    <div class="w-full px-6">
                        <label for="process_temp" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Temperature (&deg;C)</label>
                        <input type="text" id="process_temp" name="process_temp" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="Temperature (&deg;C)"/>
                    </div>              
                    <div class="w-full px-6">
                        <label for="process_ph" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">pH Level</label>
                        <input type="text" id="process_ph" name="process_ph" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="pH Level"/>
                    </div> 
                    <div class="w-full px-6">
                        <label for="process_note" class="block ms-2 mb-2 text-md font-medium text-gray-900 dark:text-white">Notes</label>
                        <textarea id="process_note" name="process_note" rows="2" class="block rounded-lg ps-2 px-2.5 py-2.5 w-full text-md text-gray-900 bg-gray-50 dark:bg-dark-contrast border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-cyan-600" placeholder="Write your notes here..."></textarea>
                    </div>
                </div>
            </div>
            <div class="flex justify-between mt-auto px-6 pt-4">
                <button @click="step = 1" type="button" class="w-24 items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2">Previous</button>
                <button type="submit" class="w-24 items-center text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">Next</button>
            </div> 
        </div>
    </form>
</div>
{% endblock subcontent %}
